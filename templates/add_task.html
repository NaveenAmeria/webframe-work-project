{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">

    <div class="card border-0" style="background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px;">
      <div class="card-header border-0" style="background: rgba(0, 212, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px 16px 0 0; padding: 1.5rem;">
        <h3 class="mb-0 fw-bold" style="background: linear-gradient(135deg, #00d4ff, #00bcd4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          <i class="bi bi-lightning-charge me-2"></i>Create New Task
        </h3>
      </div>

      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('add_task') }}" novalidate>

          <!-- Title -->
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold" style="color: #ffffff;">
              Task Title <span style="color: rgba(255, 255, 255, 0.6);">*</span>
            </label>
            <input
              type="text"
              id="title"
              name="title"
              class="form-control"
              placeholder="e.g. Complete Math Assignment"
              maxlength="120"
              required
              autofocus
              style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; border-radius: 10px;"
            />
            <div class="form-text" style="color: rgba(255, 255, 255, 0.5);">Keep it short and clear.</div>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label for="description" class="form-label fw-semibold" style="color: #ffffff;">
              Description <span style="color: rgba(255, 255, 255, 0.5);">(optional)</span>
            </label>
            <textarea
              id="description"
              name="description"
              class="form-control"
              rows="3"
              placeholder="e.g. Chapters 3-5, exercises from page 78"
              maxlength="300"
              style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; border-radius: 10px;"
            ></textarea>
          </div>

          <!-- Deadline -->
          <div class="mb-4">
            <label for="deadline" class="form-label fw-semibold" style="color: #ffffff;">
              Deadline <span style="color: rgba(255, 255, 255, 0.5);">(optional)</span>
            </label>
            <input
              type="date"
              id="deadline"
              name="deadline"
              class="form-control"
              style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; border-radius: 10px;"
            />
            <div class="form-text" style="color: rgba(255, 255, 255, 0.5);">Leave blank if there is no deadline.</div>
          </div>

          <!-- Style placeholders -->
          <style>
            input::placeholder, textarea::placeholder {
              color: rgba(255, 255, 255, 0.4) !important;
            }
            input:-webkit-autofill, textarea:-webkit-autofill {
              -webkit-box-shadow: inset 0 0 0 1000px rgba(255, 255, 255, 0.08) !important;
              -webkit-text-fill-color: #ffffff !important;
            }
          </style>

          <!-- Buttons -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-plus-circle me-2"></i>Create Task
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-danger">
              <i class="bi bi-x-circle me-1"></i>Cancel
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
